<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Food Login</title>

<link rel="stylesheet" href="login.css">
</head>

<body>

<h1>WELCOME ORDER-ME-NOW SHOP</h1>

<div class="container">
    <div class="left"></div>

    <div class="right">
        <h2>🍔 Food Login</h2>
        <input type="text" id="a" placeholder="username">
        <input type="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p>Don't have account? <span>Sign Up</span></p>
    </div>
</div>

<script>
    function login() {

    let us = document.getElementById("a").value;

    if (us.trim() !== "") {
        window.location.href = "home.html";
    } else {
        alert("username not given");
    }
}
</script> <!-- JS connect -->
</body>
</html>
